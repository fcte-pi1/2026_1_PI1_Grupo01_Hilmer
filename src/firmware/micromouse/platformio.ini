[env:esp32dev]
platform = espressif32
board = esp32dev
framework = arduino

monitor_speed = 115200

build_flags =
    -Isrc

[env:native]
platform = native
test_framework = unity

build_flags =
    -Isrc

test_build_src = yes

build_src_filter =
    +<memory/>
    +<navigation/>
    +<utils/>

    -<main.cpp>
    -<test_runner.cpp>
    -<tasks/>
    -<communication/>
    -<motors/>
    -<sensors/>

[env:esp32dev_test]
extends = env:esp32dev
build_flags =
    ${env:esp32dev.build_flags}
    -DTEST_MODE=1
build_src_filter =
    +<memory/>
    +<navigation/>
    +<test_runner.cpp>
    -<main.cpp>
    -<tasks/>
    -<communication/>
    -<motors/>
    -<sensors/>